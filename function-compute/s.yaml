edition: 3.0.0
name: ielts-ai-correction
access: default

vars:
  region: cn-beijing

resources:
  ielts-ai-fc:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ielts-ai-correction
      description: "IELTS interactive HTML — Zhipu-backed minimum-correction AI"
      runtime: nodejs18
      handler: index.fc
      cpu: 0.1
      memorySize: 128
      timeout: 60
      diskSize: 512
      code: ./
      # Log Service config (added 2026-05-02). FC stdout/stderr ships
      # to SLS so we can use `s logs --tail` for live debugging instead
      # of having to redeploy with console.error every time. Project +
      # logstore created via aliyun-log-python-sdk; see scripts in
      # IELTS repo. Cost: <¥1/month at our log volume.
      logConfig:
        project: aischool-fc-logs
        logstore: ielts-ai-correction
        enableRequestMetrics: true
        enableInstanceMetrics: true
        logBeginRule: DefaultRegex
      environmentVariables:
        ZHIPU_API_KEY: ${env('ZHIPU_API_KEY')}
        # Model ID hardcoded 2026-05-02 to glm-4-flash. We previously read
        # this from a local env var which let the deployed FC drift to
        # glm-4.7-flash (which Zhipu rate-limits aggressively during class
        # hours, error 1305). Hardcoded here to avoid silent drift; edit
        # this string + `s deploy` to change models.
        ZHIPU_MODEL_ID: "glm-4-flash"
        # === Admin password rotation (Round 29 — 2026-05-03) ===========
        # See scripts/admin/index.html and the /admin/* routes in index.js.
        # All four vars MUST be set before `s deploy` or admin routes 503.
        # Recovery if the admin password is forgotten: edit
        # ADMIN_PASSWORD_HASH below and re-deploy.
        #
        # ADMIN_PASSWORD_HASH: SHA-256 hex (lowercase) of the chosen
        # permanent admin password. Generate with:
        #   echo -n "your-admin-pw" | openssl dgst -sha256 -hex | awk '{print $2}'
        # OR:
        #   python -c "import hashlib; print(hashlib.sha256(b'your-admin-pw').hexdigest())"
        ADMIN_PASSWORD_HASH: ${env('ADMIN_PASSWORD_HASH')}
        # JWT_SECRET: 32+ random bytes (hex). Used to HMAC the admin
        # session token. Generate with:
        #   python -c "import secrets; print(secrets.token_hex(32))"
        JWT_SECRET: ${env('JWT_SECRET')}
        # OSS write credentials — RAM user with PutObject on both buckets
        # only. NOT the same keys as upload_to_oss.py (which uses your
        # personal aliyun keys); create a dedicated RAM user for FC.
        ALIYUN_OSS_REGION: "oss-cn-beijing"
        ALIYUN_OSS_ACCESS_KEY_ID: ${env('ALIYUN_OSS_ACCESS_KEY_ID')}
        ALIYUN_OSS_ACCESS_KEY_SECRET: ${env('ALIYUN_OSS_ACCESS_KEY_SECRET')}
        # Bucket names — admin /admin/set-password writes _pwhash.json to
        # both, keeping IELTS + IGCSE in lockstep.
        IELTS_BUCKET: "aischool-ielts-bj"
        IGCSE_BUCKET: "aischool-igcse-bj"
      # Concurrency cap: default per-instance is 1 (FC v3), and instance
      # concurrency cap defaults around 100. Raising both gives the function
      # headroom for start-of-class burst (~200 students hitting Correct
      # within the same minute). The client-side jitter+retry in
      # inserted_script.js already softens the first wave; this raises the
      # ceiling so retries succeed instead of just delaying failure.
      instanceConcurrency: 10  # 10 concurrent requests per warm instance
      # asyncConfiguration left default — corrections are sync POSTs.
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - POST
              - OPTIONS
              - GET
        # Scheduled warmup: GET /health every 5 min between 06:50 and 22:55
        # Beijing time. Keeps at least one instance hot through the school
        # day so the first student of each session avoids the 1-3s cold
        # start. ~192 invocations/day × 365 days ≈ 70k/year, well within
        # FC free tier. Cron format: seconds minutes hours day-of-month
        # month day-of-week. Aliyun cron uses Beijing time when
        # `cronExpression` doesn't include a TZ.
        - triggerName: warmup
          triggerType: timer
          triggerConfig:
            cronExpression: "0 */5 6-23 * * *"
            enable: true
            payload: '{"rawPath": "/health", "requestContext": {"http": {"method": "GET", "path": "/health"}}, "headers": {}, "body": ""}'
