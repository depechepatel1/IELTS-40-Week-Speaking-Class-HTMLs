<!-- AI-INTERACTIVE-V1: polished section overlay (button-row sits at the
     green box's top-right via CSS; __ORIG_LINES__ is replaced by the
     captured original .lines element). -->
<div class="button-row">
  <button class="tts-btn uk" disabled title="UK voice"
          onclick="window.__ielts.speakElementById('polished-output','en-GB')">🇬🇧 Listen</button>
  <button class="tts-btn us" disabled title="US voice"
          onclick="window.__ielts.speakElementById('polished-output','en-US')">🇺🇸 Listen</button>
  <button class="tts-btn slow" disabled title="Slow"
          onclick="window.__ielts.speakElementById('polished-output','en-GB',0.7)">🐢</button>
  <button class="tts-btn pause" disabled title="Pause / resume"
          onclick="window.__ielts.pauseSpeaking()">⏸</button>
  <button class="tts-btn stop" title="Stop"
          onclick="window.__ielts.stopSpeaking()">⏹</button>
</div>
<div class="lines-overlay-host">
  __ORIG_LINES__
  <div id="polished-output" class="writing-output empty"></div>
</div>
