<!-- AI-INTERACTIVE-V1: polished section overlay (button-row sits at the
     green box's top-right via CSS; the placeholder inside
     .lines-overlay-host is replaced at runtime). -->
<div class="button-row" id="polished-listen-row">
  <button class="tts-btn uk active" disabled title="UK voice"
          onclick="window.__ielts.listenPolished('en-GB')">🇬🇧</button>
  <button class="tts-btn us" disabled title="US voice"
          onclick="window.__ielts.listenPolished('en-US')">🇺🇸</button>
  <button class="tts-btn slow" disabled title="Slow (uses selected accent)"
          onclick="window.__ielts.listenPolished('slow')">🐢</button>
  <button class="tts-btn pause" disabled title="Pause / resume"
          onclick="window.__ielts.pauseSpeaking()">⏸</button>
  <button class="tts-btn stop" title="Stop"
          onclick="window.__ielts.stopSpeaking()">⏹</button>
</div>
<div class="lines-overlay-host">
  __ORIG_LINES__
  <div id="polished-output" class="writing-output empty"></div>
</div>
<!-- AI-INTERACTIVE-V1 voice-recorder widget; sits at the bottom of the
     Polished Rewrite pastel box. JS in inserted_script.js wires the buttons
     (record/pause/stop/play/re-record), persists Blob to IndexedDB keyed by
     lesson, 3-min hard cap. -->
<div class="voice-recorder-container">
  <div class="vr-controls">
    <button class="vr-btn vr-record" title="Record / 录音">⏺</button>
    <button class="vr-btn vr-pause" title="Pause / resume" hidden>⏸</button>
    <button class="vr-btn vr-stop"  title="Stop / 停止"   hidden>⏹</button>
    <button class="vr-btn vr-play"  title="Play / 播放"   hidden>▶</button>
    <button class="vr-btn vr-delete" title="Re-record / 重录" hidden>🗑</button>
  </div>
  <span class="vr-time">--:--</span>
  <span class="vr-label">Click ⏺ to record (3:00 max)</span>
  <audio></audio>
</div>
