<!-- AI-INTERACTIVE-V1 inline voice-recorder widget — used for the
     brainstorming-map (top-right) and Q1-Q6 writing boxes (bottom-right).
     Each instance MUST have a unique data-recorder-id so its recordings
     get their own IndexedDB key (LESSON_KEY:recorder-id) and don't get
     mixed up with other widgets' recordings on the same page. The JS in
     inserted_script.js wires the buttons via initVoiceRecorder().
     Round 34 (2026-05-06) — added <span class="vr-label vr-label-compact">
     so vrSetState() can write the same status text it writes on the
     polished recorder ("Recording…", "Saved — tap ▶ to play, 🗑 to re-record").
     CSS rules in inserted_css.css hide it on the idle state to preserve
     the original compact density on spider-legs / Q-write cards, then
     reveal it on every other state for clear feedback. -->
<div class="voice-recorder-container vr-inline" data-recorder-id="__RECORDER_ID__">
  <div class="vr-controls">
    <button class="vr-btn vr-record" title="Record / 录音">⏺</button>
    <button class="vr-btn vr-pause"  title="Pause / 暂停"  hidden>⏸</button>
    <button class="vr-btn vr-stop"   title="Stop / 停止"   hidden>⏹</button>
    <button class="vr-btn vr-play"   title="Play / 播放"   hidden>▶</button>
    <button class="vr-btn vr-delete" title="Re-record / 重录" hidden>🗑</button>
  </div>
  <span class="vr-time">--:--</span>
  <span class="vr-label vr-label-compact"></span>
  <audio></audio>
</div>
